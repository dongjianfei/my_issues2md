{{define "index.html"}}<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>issue2md</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #24292e;
      background: #f6f8fa;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #24292e;
      padding: 12px 16px;
    }
    .header h1 {
      color: #ffffff;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Main content */
    .container {
      max-width: 800px;
      margin: 32px auto;
      padding: 0 16px;
    }

    /* Card */
    .card {
      background: #ffffff;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #24292e;
    }

    /* Form elements */
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #24292e;
    }
    .label-hint {
      font-weight: 400;
      color: #586069;
      font-size: 12px;
      margin-left: 6px;
    }

    textarea {
      width: 100%;
      padding: 8px 12px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #24292e;
      background: #ffffff;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus {
      border-color: #0366d6;
      box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.15);
    }

    /* Checkboxes */
    .options {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 400;
      cursor: pointer;
      color: #24292e;
    }
    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    /* Submit button */
    .btn-primary {
      display: inline-block;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: #2da44e;
      border: 1px solid rgba(27, 31, 36, 0.15);
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: background 0.15s;
      margin-top: 20px;
    }
    .btn-primary:hover {
      background: #2c974b;
    }
    .btn-primary:active {
      background: #298e46;
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Progress section */
    #progressSection {
      display: none;
    }
    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: #e1e4e8;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    #progressFill {
      height: 100%;
      width: 0%;
      background: #2da44e;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    #progressCount {
      font-size: 12px;
      color: #586069;
    }

    /* Results section */
    #resultsSection {
      /* populated by JS */
    }

    /* Download all footer */
    #btnDownloadAll {
      display: none;
      margin-top: 16px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: #0366d6;
      border: 1px solid rgba(27, 31, 36, 0.15);
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: background 0.15s;
    }
    #btnDownloadAll:hover {
      background: #035cc1;
    }

    /* Result cards */
    .result-card {
      background: #ffffff;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f6f8fa;
      border-bottom: 1px solid #e1e4e8;
    }
    .result-header.error {
      background: #fff5f5;
    }
    .result-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-icon-ok {
      color: #2da44e;
      font-weight: 700;
      font-size: 16px;
    }
    .result-icon-err {
      color: #cf222e;
      font-weight: 700;
      font-size: 16px;
    }
    .result-ref {
      font-size: 13px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      color: #24292e;
    }
    .result-preview {
      padding: 12px 16px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      color: #586069;
      max-height: 60px;
      overflow: hidden;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .result-full {
      display: none;
      padding: 12px 16px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      background: #f6f8fa;
      border-top: 1px solid #e1e4e8;
    }
    .result-error {
      padding: 12px 16px;
      font-size: 13px;
      color: #cf222e;
    }
    .btn-sm {
      background: #ffffff;
      border: 1px solid #d0d7de;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      color: #24292e;
    }
    .btn-sm:hover {
      background: #f3f4f6;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>issue2md</h1>
  </header>

  <div class="container">
    <div class="card">
      <h2>转换 GitHub Issue 为 Markdown</h2>
      <form id="convertForm" action="/convert" method="POST">
        <label for="urls">
          Issue URL 列表
          <span class="label-hint">每行一个</span>
        </label>
        <textarea
          id="urls"
          name="urls"
          rows="8"
          placeholder="https://github.com/owner/repo/issues/1&#10;https://github.com/owner/repo/issues/2&#10;https://github.com/owner/repo/issues/3"
        ></textarea>

        <div class="options">
          <label class="checkbox-label">
            <input type="checkbox" name="enable_reactions" value="on">
            显示 Reactions
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="enable_user_links" value="on">
            启用用户链接
          </label>
        </div>

        <button type="submit" id="btnConvert" class="btn-primary">开始转换</button>
      </form>
    </div>

    <div id="progressSection" class="card">
      <div class="progress-bar-track">
        <div id="progressFill"></div>
      </div>
      <div id="progressCount">正在处理…</div>
    </div>

    <div id="resultsSection"></div>

    <button id="btnDownloadAll">全部下载 (.zip)</button>
  </div>

  <script>
(function() {
  const form = document.getElementById('convertForm');
  const btnConvert = document.getElementById('btnConvert');
  const progressSection = document.getElementById('progressSection');
  const progressCount = document.getElementById('progressCount');
  const progressFill = document.getElementById('progressFill');
  const resultsSection = document.getElementById('resultsSection');
  const btnDownloadAll = document.getElementById('btnDownloadAll');

  let results = [];

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    results = [];
    resultsSection.innerHTML = '';
    btnDownloadAll.style.display = 'none';
    progressSection.style.display = 'block';
    progressCount.textContent = '0 / 0 完成';
    progressFill.style.width = '0%';
    btnConvert.disabled = true;

    const formData = new FormData(form);
    let total = 0;
    let processed = 0;
    try {
      const response = await fetch('/convert', { method: 'POST', body: new URLSearchParams(formData) });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        let currentEvent = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) {
            currentEvent = line.substring(7);
          } else if (line.startsWith('data: ')) {
            const data = JSON.parse(line.substring(6));
            handleEvent(currentEvent, data);
          }
        }
      }
    } catch (err) {
      resultsSection.innerHTML += '<div class="result-card"><div class="result-header error"><div class="result-info"><span class="result-icon-err">✗</span><span>网络错误: ' + escapeHtml(err.message) + '</span></div></div></div>';
    } finally {
      btnConvert.disabled = false;
    }

    function handleEvent(event, data) {
      if (event === 'start') {
        total = data.total;
        progressCount.textContent = '0 / ' + total + ' 完成';
      } else if (event === 'result') {
        processed++;
        progressCount.textContent = processed + ' / ' + total + ' 完成';
        progressFill.style.width = (processed / total * 100) + '%';
        appendResult(data);
        if (data.success) {
          results.push({ filename: data.filename, content: data.markdown });
        }
      } else if (event === 'done') {
        if (results.length > 0) {
          btnDownloadAll.style.display = 'inline-block';
        }
      } else if (event === 'error') {
        resultsSection.innerHTML += '<div class="result-card"><div class="result-header error"><div class="result-info"><span class="result-icon-err">✗</span><span>' + escapeHtml(data.message) + '</span></div></div></div>';
      }
    }
  });

  function appendResult(result) {
    const card = document.createElement('div');
    card.className = 'result-card';

    if (result.success) {
      const preview = escapeHtml(result.markdown.substring(0, 200));
      card.innerHTML =
        '<div class="result-header">' +
          '<div class="result-info">' +
            '<span class="result-icon-ok">✓</span>' +
            '<span class="result-ref">' + escapeHtml(result.filename.replace('.md','')) + '</span>' +
          '</div>' +
          '<div>' +
            '<button class="btn-sm" onclick="toggleExpand(this)">展开</button> ' +
            '<button class="btn-sm" onclick="downloadOne(\'' + escapeAttr(result.filename) + '\',' + result.index + ')">下载 .md</button>' +
          '</div>' +
        '</div>' +
        '<div class="result-preview">' + preview + '</div>' +
        '<div class="result-full">' + escapeHtml(result.markdown) + '</div>';
    } else {
      card.innerHTML =
        '<div class="result-header error">' +
          '<div class="result-info">' +
            '<span class="result-icon-err">✗</span>' +
            '<span class="result-ref">' + escapeHtml(result.url) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="result-error">' + escapeHtml(result.error) + '</div>';
    }
    resultsSection.appendChild(card);
  }

  window.toggleExpand = function(btn) {
    const card = btn.closest('.result-card');
    const full = card.querySelector('.result-full');
    const preview = card.querySelector('.result-preview');
    if (full.style.display === 'block') {
      full.style.display = 'none';
      preview.style.display = 'block';
      btn.textContent = '展开';
    } else {
      full.style.display = 'block';
      preview.style.display = 'none';
      btn.textContent = '收起';
    }
  };

  window.downloadOne = function(filename, index) {
    const item = results.find(r => r.filename === filename);
    if (!item) return;
    const f = document.createElement('form');
    f.method = 'POST';
    f.action = '/download';
    f.style.display = 'none';
    f.innerHTML = '<input name="filename" value="' + escapeAttr(item.filename) + '">' +
                  '<input name="content" value="' + escapeAttr(item.content) + '">';
    document.body.appendChild(f);
    f.submit();
    document.body.removeChild(f);
  };

  btnDownloadAll.addEventListener('click', function() {
    const f = document.createElement('form');
    f.method = 'POST';
    f.action = '/download-all';
    f.style.display = 'none';
    f.innerHTML = '<input name="files" value="' + escapeAttr(JSON.stringify(results)) + '">';
    document.body.appendChild(f);
    f.submit();
    document.body.removeChild(f);
  });

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function escapeAttr(str) {
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
})();
  </script>
</body>
</html>
{{end}}
