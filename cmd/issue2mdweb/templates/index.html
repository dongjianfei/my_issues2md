{{define "index.html"}}<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>issue2md</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #24292e;
      background: #f6f8fa;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #24292e;
      padding: 12px 16px;
    }
    .header h1 {
      color: #ffffff;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Main content */
    .container {
      max-width: 800px;
      margin: 32px auto;
      padding: 0 16px;
    }

    /* Card */
    .card {
      background: #ffffff;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #24292e;
    }

    /* Form elements */
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #24292e;
    }
    .label-hint {
      font-weight: 400;
      color: #586069;
      font-size: 12px;
      margin-left: 6px;
    }

    textarea {
      width: 100%;
      padding: 8px 12px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #24292e;
      background: #ffffff;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus {
      border-color: #0366d6;
      box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.15);
    }

    /* Checkboxes */
    .options {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 400;
      cursor: pointer;
      color: #24292e;
    }
    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    /* Submit button */
    .btn-primary {
      display: inline-block;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: #2da44e;
      border: 1px solid rgba(27, 31, 36, 0.15);
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: background 0.15s;
      margin-top: 20px;
    }
    .btn-primary:hover {
      background: #2c974b;
    }
    .btn-primary:active {
      background: #298e46;
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Progress section */
    #progressSection {
      display: none;
    }
    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: #e1e4e8;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    #progressFill {
      height: 100%;
      width: 0%;
      background: #2da44e;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    #progressCount {
      font-size: 12px;
      color: #586069;
    }

    /* Results section */
    #resultsSection {
      /* populated by JS */
    }

    /* Download all footer */
    #btnDownloadAll {
      display: none;
      margin-top: 16px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: #0366d6;
      border: 1px solid rgba(27, 31, 36, 0.15);
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: background 0.15s;
    }
    #btnDownloadAll:hover {
      background: #035cc1;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>issue2md</h1>
  </header>

  <div class="container">
    <div class="card">
      <h2>转换 GitHub Issue 为 Markdown</h2>
      <form id="convertForm" action="/convert" method="POST">
        <label for="urls">
          Issue URL 列表
          <span class="label-hint">每行一个</span>
        </label>
        <textarea
          id="urls"
          name="urls"
          rows="8"
          placeholder="https://github.com/owner/repo/issues/1&#10;https://github.com/owner/repo/issues/2&#10;https://github.com/owner/repo/issues/3"
        ></textarea>

        <div class="options">
          <label class="checkbox-label">
            <input type="checkbox" name="enable_reactions" value="true">
            显示 Reactions
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="enable_user_links" value="true">
            启用用户链接
          </label>
        </div>

        <button type="submit" id="btnConvert" class="btn-primary">开始转换</button>
      </form>
    </div>

    <div id="progressSection" class="card">
      <div class="progress-bar-track">
        <div id="progressFill"></div>
      </div>
      <div id="progressCount">正在处理…</div>
    </div>

    <div id="resultsSection"></div>

    <button id="btnDownloadAll">全部下载 (.zip)</button>
  </div>

  <script>
    // JS will be added in Task 7
  </script>
</body>
</html>
{{end}}
